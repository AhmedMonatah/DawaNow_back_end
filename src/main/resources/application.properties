spring.application.name=dawa-now

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dawanow}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:pass123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true

dawanow.data.products.import-enabled=${PRODUCT_IMPORT_ENABLED:false}

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info

